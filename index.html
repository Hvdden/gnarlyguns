<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GNARLYGUNS // OFFICIAL HUB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff0055;
            --twitch: #9146ff;
            --yt: #ff0000;
            --tt: #00f2ea;
            --bg-dark: #020204;
            --panel-bg: rgba(8, 8, 12, 0.9);
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #gameCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            cursor: crosshair;
        }

        /* --- HUD --- */
        .hud {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            font-family: 'Orbitron';
            color: var(--accent);
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.5);
            pointer-events: none;
        }

        /* --- MAIN UI WRAPPER --- */
        .content-wrapper {
            position: relative;
            z-index: 100;
            width: 90%;
            max-width: 1100px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- BRANDING HEADER --- */
        .main-header {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(0,0,0,0.6);
            padding: 15px 25px;
            border-left: 4px solid var(--accent);
            backdrop-filter: blur(5px);
            align-self: flex-start;
        }

        .logo-frame {
            width: 60px; height: 60px;
            background: #000;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-frame img { width: 85%; height: 85%; object-fit: contain; }

        .brand-info h1 {
            font-family: 'Orbitron';
            font-size: 1.8rem;
            letter-spacing: 3px;
            color: #fff;
            line-height: 1;
        }

        .brand-info p {
            font-size: 0.8rem;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
        }

        /* --- LINKS PANEL --- */
        .links-panel {
            pointer-events: auto;
            background: var(--panel-bg);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 Columns on Desktop */
            gap: 15px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .social-card {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 10px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            text-decoration: none;
            color: #fff;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
        }

        .social-card i, .social-card svg {
            font-size: 2.2rem;
            margin-bottom: 15px;
            transition: 0.3s;
            fill: #fff;
            width: 35px;
            height: 35px;
        }

        .social-card span {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }

        /* Hover & Interaction */
        .social-card:hover {
            background: rgba(255,255,255,0.07);
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .social-card::before {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 3px;
            background: var(--accent);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .social-card:hover::before { transform: scaleX(1); }

        /* Specific Platform Accents */
        .social-card.twitch:hover { border-color: var(--twitch); }
        .social-card.twitch:hover::before { background: var(--twitch); }
        
        .social-card.youtube:hover { border-color: var(--yt); }
        .social-card.youtube:hover::before { background: var(--yt); }

        .social-card.tiktok:hover { border-color: var(--tt); }
        .social-card.tiktok:hover::before { background: var(--tt); }

        /* --- MOBILE OPTIMIZATION --- */
        @media (max-width: 900px) {
            .links-panel { grid-template-columns: 1fr 1fr; } /* 2x2 Grid on Tablets */
        }

        @media (max-width: 600px) {
            body { justify-content: flex-end; padding-bottom: 30px; }
            
            .content-wrapper { width: 92%; gap: 10px; }
            
            .main-header { align-self: stretch; padding: 10px 15px; }
            .logo-frame { width: 45px; height: 45px; }
            .brand-info h1 { font-size: 1.2rem; }
            
            .links-panel { 
                grid-template-columns: 1fr; /* Stacks vertically for thumb-scrolling */
                padding: 15px;
                gap: 10px;
            }

            .social-card {
                flex-direction: row;
                justify-content: flex-start;
                padding: 18px 20px;
            }

            .social-card i, .social-card svg { margin-bottom: 0; margin-right: 20px; font-size: 1.4rem; width: 24px; height: 24px; }
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div class="hud">
        <div id="score">KILLS: 0</div>
    </div>

    <div class="content-wrapper">
        <header class="main-header">
            <div class="logo-frame">
                <img src="logo.png" alt="Logo">
            </div>
            <div class="brand-info">
                <h1>GnarlyGuns</h1>
                <p>Status: Online & Defending</p>
            </div>
        </header>

        <main class="links-panel">
            <a href="https://twitch.tv/gnarlyguns" class="social-card twitch" target="_blank">
                <i class="fab fa-twitch"></i>
                <span>Twitch</span>
            </a>
            <a href="https://youtube.com/@gnarlyguns" class="social-card youtube" target="_blank">
                <i class="fab fa-youtube"></i>
                <span>YouTube</span>
            </a>
            <a href="https://tiktok.com/@gnarlyguns" class="social-card tiktok" target="_blank">
                <i class="fab fa-tiktok"></i>
                <span>TikTok</span>
            </a>
            <a href="https://twitter.com/gnarlyguns" class="social-card" target="_blank">
                <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path></svg>
                <span>Twitter / X</span>
            </a>
        </main>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let score = 0;
        let asteroids = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Asteroid {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = -60;
                this.size = Math.random() * 25 + 15;
                this.speed = Math.random() * 2 + 1;
                this.rot = 0;
                this.rotSpd = Math.random() * 0.05;
            }
            update() { 
                this.y += this.speed; 
                this.rot += this.rotSpd;
                if(this.y > canvas.height + 60) { this.y = -60; this.x = Math.random() * canvas.width; }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x + this.size/2, this.y + this.size/2);
                ctx.rotate(this.rot);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                ctx.lineWidth = 1.5;
                ctx.strokeRect(-this.size/2, -this.size/2, this.size, this.size);
                ctx.restore();
            }
        }

        function gameLoop() {
            ctx.fillStyle = 'rgba(2, 2, 4, 0.4)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            if (asteroids.length < 12) asteroids.push(new Asteroid());
            asteroids.forEach(a => { a.update(); a.draw(); });
            requestAnimationFrame(gameLoop);
        }

        function handleShoot(clientX, clientY) {
            asteroids.forEach((a, i) => {
                const dx = clientX - (a.x + a.size/2);
                const dy = clientY - (a.y + a.size/2);
                if (Math.hypot(dx, dy) < 50) {
                    asteroids.splice(i, 1);
                    score++;
                    document.getElementById('score').innerText = `KILLS: ${score}`;
                }
            });
        }

        canvas.addEventListener('mousedown', (e) => handleShoot(e.clientX, e.clientY));
        canvas.addEventListener('touchstart', (e) => {
            handleShoot(e.touches[0].clientX, e.touches[0].clientY);
        });

        gameLoop();
    </script>
</body>
</html>
