<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GNARLYGUNS // EST. 2026 // Connect & Defend</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff0055;
            --accent-rgb: 255, 0, 85;
            --cyber-blue: #00f2ff;
            --twitch: #9146ff;
            --bg-dark: #010101;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            /* CRITICAL: Perspective on body allows 3D effects below */
            perspective: 1200px;
        }

        /* --- LAYERING: Z-INDEX 1 (GAME) --- */
        #gameCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0) 50%, rgba(0,0,0,0.05) 50%);
            background-size: 100% 4px;
            z-index: 2;
            pointer-events: none;
        }

        /* --- LAYERING: Z-INDEX 100 (UI) --- */
        #scene {
            position: relative;
            z-index: 100;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none; /* Let clicks hit the game background */
            transform-style: preserve-3d;
        }

        .main-panel {
            pointer-events: auto; /* Re-enable clicks for buttons only */
            width: 90%;
            max-width: 1000px;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(var(--accent-rgb), 0.3);
            padding: 50px;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 40px;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            transform: translateZ(50px); /* Keeps it in front of canvas */
            position: relative;
        }

        /* Kinetic Corners */
        .panel-corner {
            position: absolute;
            width: 20px; height: 20px;
            border: 2px solid var(--accent);
        }
        .top-left { top: -5px; left: -5px; border-right: none; border-bottom: none; }
        .bottom-right { bottom: -5px; right: -5px; border-left: none; border-top: none; }

        /* --- Left Side: Branding --- */
        .id-section {
            text-align: center;
            border-right: 1px solid rgba(255,255,255,0.1);
            padding-right: 30px;
        }

        .logo-container {
            width: 160px; height: 160px;
            margin: 0 auto 20px;
            transition: 0.3s;
        }

        .logo-container img {
            width: 100%; height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 10px var(--accent));
        }

        .logo-container:hover img {
            animation: glitch 0.2s infinite;
        }

        .glitch-name {
            font-family: 'Orbitron';
            font-size: 2.2rem;
            color: var(--accent);
            letter-spacing: 3px;
        }

        /* --- Right Side: Links --- */
        .links-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
            background: rgba(var(--accent-rgb), 0.15);
            border-color: var(--accent);
        }

        .btn.twitch:hover { border-color: var(--twitch); background: rgba(145, 70, 255, 0.15); }

        .btn i, .btn svg { font-size: 1.8rem; margin-bottom: 10px; width: 30px; height: 30px; fill: white; }

        .hud {
            position: fixed;
            top: 20px; right: 20px;
            z-index: 200;
            font-family: 'Orbitron';
            color: var(--cyber-blue);
            text-align: right;
            pointer-events: none;
        }

        @keyframes glitch {
            0% { transform: translate(2px, -2px); filter: hue-rotate(45deg); }
            50% { transform: translate(-2px, 2px); filter: hue-rotate(180deg); }
            100% { transform: translate(0); }
        }

        @media (max-width: 768px) {
            .main-panel { grid-template-columns: 1fr; padding: 30px; }
            .id-section { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; }
            #scene { transform: none !important; }
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    <div class="scanlines"></div>

    <div class="hud">
        <div id="score">KILLS: 0</div>
    </div>

    <div id="scene">
        <main class="main-panel">
            <div class="panel-corner top-left"></div>
            <div class="panel-corner bottom-right"></div>

            <section class="id-section">
                <div class="logo-container">
                    <img src="logo.png" alt="GnarlyGuns">
                </div>
                <h1 class="glitch-name">GnarlyGuns</h1>
                <p style="font-size: 0.7rem; letter-spacing: 2px; margin-top: 10px; opacity: 0.6;">SECTOR DEFENDER ACTIVE</p>
            </section>

            <section class="links-grid">
                <a href="https://twitch.tv/gnarlyguns" class="btn twitch" target="_blank">
                    <i class="fab fa-twitch"></i>
                    <strong>TWITCH</strong>
                </a>
                <a href="https://youtube.com/@gnarlyguns" class="btn" target="_blank">
                    <i class="fab fa-youtube"></i>
                    <strong>YOUTUBE</strong>
                </a>
                <a href="https://tiktok.com/@gnarlyguns" class="btn" target="_blank">
                    <i class="fab fa-tiktok"></i>
                    <strong>TIKTOK</strong>
                </a>
                <a href="https://twitter.com/gnarlyguns" class="btn" target="_blank">
                    <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path></svg>
                    <strong>TWITTER</strong>
                </a>
            </section>
        </main>
    </div>

    <script>
        // 1. 3D Interaction Logic
        const scene = document.getElementById('scene');
        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth > 768) {
                const x = (window.innerWidth / 2 - e.pageX) / 45;
                const y = (window.innerHeight / 2 - e.pageY) / 45;
                scene.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
            }
        });

        // 2. Asteroid Game Logic
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let score = 0;
        let asteroids = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Asteroid {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = -50;
                this.size = Math.random() * 20 + 10;
                this.speed = Math.random() * 2 + 1;
            }
            update() { this.y += this.speed; if(this.y > canvas.height) this.y = -50; }
            draw() {
                ctx.strokeStyle = '#555';
                ctx.strokeRect(this.x, this.y, this.size, this.size);
            }
        }

        function gameLoop() {
            ctx.fillStyle = 'rgba(1, 1, 3, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (asteroids.length < 15) asteroids.push(new Asteroid());
            
            asteroids.forEach(a => { a.update(); a.draw(); });
            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('mousedown', (e) => {
            // Hit detection
            asteroids.forEach((a, i) => {
                if (Math.hypot(e.clientX - a.x, e.clientY - a.y) < 40) {
                    asteroids.splice(i, 1);
                    score++;
                    document.getElementById('score').innerText = `KILLS: ${score}`;
                }
            });
        });

        gameLoop();
    </script>
</body>
</html>
