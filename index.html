<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GNARLYGUNS // OFFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff0055;
            --twitch: #9146ff;
            --bg-dark: #020204;
            --panel-bg: rgba(8, 8, 12, 0.95);
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            height: 100dvh; 
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            perspective: 1000px; 
        }

        #gameCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        /* --- HUD & VOLUME UI --- */
        .hud-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
            font-family: 'Orbitron';
            pointer-events: none;
        }

        .score-display {
            color: var(--accent);
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 15px;
            border-right: 3px solid var(--accent);
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-right: 3px solid var(--twitch);
            pointer-events: auto; /* Enable interaction for the slider */
            backdrop-filter: blur(5px);
        }

        .volume-control i {
            color: var(--twitch);
            font-size: 0.9rem;
        }

        #volumeSlider {
            -webkit-appearance: none;
            width: 100px;
            height: 4px;
            background: #222;
            outline: none;
            cursor: pointer;
        }

        #volumeSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 0;
            box-shadow: 0 0 10px var(--accent);
            cursor: pointer;
        }

        /* --- THE MOVING LAYER --- */
        #parallax-layer {
            position: relative;
            z-index: 100;
            width: 90%;
            max-width: 1100px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            pointer-events: none;
            transition: transform 0.1s ease-out; 
            transform-style: preserve-3d;
        }

        .main-header {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-left: 4px solid var(--accent);
            backdrop-filter: blur(10px);
            align-self: flex-start;
            transform: translateZ(20px); 
        }

        .logo-frame { width: 55px; height: 55px; border: 1px solid #222; }
        .logo-frame img { width: 100%; height: 100%; object-fit: contain; }
        .brand-info h1 { font-family: 'Orbitron'; font-size: 1.6rem; letter-spacing: 2px; line-height: 1; }
        .brand-info p { font-size: 0.8rem; color: var(--accent); text-transform: uppercase; margin-top: 4px; }

        .links-panel {
            pointer-events: auto;
            background: var(--panel-bg);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            transform: translateZ(10px); 
        }

        .social-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 35px 10px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            text-decoration: none;
            color: #fff;
            transition: 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .social-card i, .social-card svg { font-size: 2.2rem; margin-bottom: 15px; fill: #fff; width: 35px; height: 35px; }
        .social-card span { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; }

        .social-card:hover {
            background: rgba(255,255,255,0.08);
            border-color: var(--accent);
            transform: translateY(-5px) translateZ(15px);
        }

        @media (max-width: 900px) {
            .links-panel { grid-template-columns: 1fr 1fr; }
        }

        @media (max-width: 600px) {
            body { justify-content: flex-end; perspective: none; }
            #parallax-layer { 
                width: 95%; 
                padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 15px);
                gap: 10px;
                transform: none !important; 
            }
            .main-header { align-self: stretch; padding: 10px; transform: none; }
            .logo-frame { width: 40px; height: 40px; }
            .brand-info h1 { font-size: 1.1rem; }
            .links-panel { grid-template-columns: 1fr; padding: 15px; gap: 8px; transform: none; }
            .social-card { flex-direction: row; padding: 14px 20px; justify-content: flex-start; }
            .social-card i, .social-card svg { margin-bottom: 0; margin-right: 20px; font-size: 1.4rem; width: 24px; height: 24px; }
        }
    </style>
</head>
<body>
    <audio id="bgMusic" src="background.mp3" loop></audio>
    <canvas id="gameCanvas"></canvas>

    <div class="hud-container">
        <div class="score-display">KILLS: <span id="score">0</span></div>
        <div class="volume-control">
            <i class="fas fa-volume-up"></i>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.4">
        </div>
    </div>

    <div id="parallax-layer">
        <header class="main-header">
            <div class="logo-frame"><img src="logo.png" alt="Logo"></div>
            <div class="brand-info">
                <h1>GnarlyGuns</h1>
                <p>SYSTEM_ONLINE</p>
            </div>
        </header>

        <main class="links-panel">
            <a href="https://twitch.tv/gnarlyguns" class="social-card" target="_blank">
                <i class="fab fa-twitch"></i>
                <span>Twitch</span>
            </a>
            <a href="https://youtube.com/@gnarlyguns" class="social-card" target="_blank">
                <i class="fab fa-youtube"></i>
                <span>YouTube</span>
            </a>
            <a href="https://tiktok.com/@gnarlyguns" class="social-card" target="_blank">
                <i class="fab fa-tiktok"></i>
                <span>TikTok</span>
            </a>
            <a href="https://twitter.com/gnarlyguns" class="social-card" target="_blank">
                <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path></svg>
                <span>X / Twitter</span>
            </a>
        </main>
    </div>

    <script>
        // --- PARALLAX LOGIC ---
        const pLayer = document.getElementById('parallax-layer');
        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth > 600) {
                const xVal = (window.innerWidth / 2 - e.pageX) / 40;
                const yVal = (window.innerHeight / 2 - e.pageY) / 40;
                pLayer.style.transform = `rotateY(${xVal}deg) rotateX(${-yVal}deg)`;
            }
        });

        // --- GAME LOGIC ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const music = document.getElementById('bgMusic');
        const volumeSlider = document.getElementById('volumeSlider');
        let score = 0;
        let asteroids = [];
        let particles = [];
        let lasers = [];
        let musicStarted = false;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Volume control interaction
        volumeSlider.addEventListener('input', (e) => {
            music.volume = e.target.value;
        });

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.life = 1.0;
                this.decay = Math.random() * 0.05 + 0.02;
                this.color = Math.random() > 0.5 ? '#ff0055' : '#9146ff';
            }
            update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, 3, 3);
                ctx.globalAlpha = 1.0;
            }
        }

        class Laser {
            constructor(startX, startY, endX, endY) {
                this.startX = startX; this.startY = startY;
                this.endX = endX; this.endY = endY;
                this.life = 1.0;
            }
            update() { this.life -= 0.15; }
            draw() {
                ctx.beginPath();
                ctx.lineWidth = this.life * 4;
                ctx.strokeStyle = `rgba(255, 0, 85, ${this.life})`;
                ctx.moveTo(this.startX, this.startY);
                ctx.lineTo(this.endX, this.endY);
                ctx.stroke();
            }
        }

        class Asteroid {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = -60;
                this.size = Math.random() * 20 + 20;
                this.speed = Math.random() * 1.5 + 1.2;
                this.rot = 0;
                this.rotS = Math.random() * 0.04;
            }
            update() { 
                this.y += this.speed; 
                this.rot += this.rotS;
                if(this.y > canvas.height + 60) { this.y = -60; this.x = Math.random() * canvas.width; }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x + this.size/2, this.y + this.size/2);
                ctx.rotate(this.rot);
                ctx.strokeStyle = 'rgba(255, 0, 85, 0.4)';
                ctx.lineWidth = 1;
                ctx.strokeRect(-this.size/2, -this.size/2, this.size, this.size);
                ctx.restore();
            }
        }

        function gameLoop() {
            ctx.fillStyle = 'rgba(2, 2, 5, 0.4)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (asteroids.length < 12) asteroids.push(new Asteroid());
            
            lasers = lasers.filter(l => l.life > 0);
            lasers.forEach(l => { l.update(); l.draw(); });

            asteroids.forEach(a => { a.update(); a.draw(); });

            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => { p.update(); p.draw(); });

            requestAnimationFrame(gameLoop);
        }

        function handleShoot(clientX, clientY) {
            // Respect volume slider on initial start
            if (!musicStarted) {
                music.volume = volumeSlider.value;
                music.play().catch(e => console.log("Playback failed:", e));
                musicStarted = true;
            }

            // Fire "weapon" laser within frame
            lasers.push(new Laser(canvas.width/2, canvas.height, clientX, clientY));

            asteroids.forEach((a, i) => {
                const dx = clientX - (a.x + a.size/2);
                const dy = clientY - (a.y + a.size/2);
                if (Math.hypot(dx, dy) < 55) {
                    for(let p=0; p<15; p++) particles.push(new Particle(a.x + a.size/2, a.y + a.size/2));
                    asteroids.splice(i, 1);
                    score++;
                    document.getElementById('score').innerText = score;
                }
            });
        }

        canvas.addEventListener('touchstart', (e) => handleShoot(e.touches[0].clientX, e.touches[0].clientY));
        canvas.addEventListener('mousedown', (e) => handleShoot(e.clientX, e.clientY));

        gameLoop();
    </script>
</body>
</html>
