<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GNARLYGUNS // MOBILE DEFENSE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff0055;
            --accent-rgb: 255, 0, 85;
            --cyber-blue: #00f2ff;
            --twitch: #9146ff;
            --bg-dark: #010101;
        }

        /* Prevent accidental scrolling/zooming on mobile */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: none; 
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            perspective: 1200px;
        }

        #gameCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        /* UI Container */
        #scene {
            position: relative;
            z-index: 100;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            transform-style: preserve-3d;
        }

        .main-panel {
            pointer-events: auto;
            width: 90%;
            max-width: 1000px;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(var(--accent-rgb), 0.3);
            padding: 40px;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 30px;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            transform: translateZ(50px);
            position: relative;
        }

        /* Branding */
        .id-section {
            text-align: center;
            border-right: 1px solid rgba(255,255,255,0.1);
            padding-right: 20px;
        }

        .logo-container {
            width: 140px; height: 140px;
            margin: 0 auto 15px;
        }

        .logo-container img {
            width: 100%; height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 10px var(--accent));
        }

        .glitch-name {
            font-family: 'Orbitron';
            font-size: 1.8rem;
            color: var(--accent);
            letter-spacing: 2px;
        }

        /* Social Grid */
        .links-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .btn:active { transform: scale(0.95); background: rgba(var(--accent-rgb), 0.2); }
        .btn i, .btn svg { font-size: 1.5rem; margin-bottom: 8px; width: 24px; height: 24px; fill: white; }

        /* HUD */
        .hud {
            position: fixed;
            top: 15px; right: 15px;
            z-index: 200;
            font-family: 'Orbitron';
            color: var(--cyber-blue);
            font-size: 0.8rem;
            pointer-events: none;
        }

        /* --- MOBILE MEDIA QUERIES --- */
        @media (max-width: 768px) {
            body { perspective: none; } /* Disable 3D to prevent touch offset issues */
            
            #scene {
                align-items: flex-end; /* Move panel to bottom on mobile */
                padding-bottom: 20px;
            }

            .main-panel {
                grid-template-columns: 1fr; /* Stack vertically */
                padding: 20px;
                gap: 20px;
                transform: none !important; /* Force flat layout */
            }

            .id-section {
                border-right: none;
                border-bottom: 1px solid rgba(255,255,255,0.1);
                padding-right: 0;
                padding-bottom: 15px;
                display: flex;
                align-items: center;
                text-align: left;
            }

            .logo-container {
                width: 60px; height: 60px;
                margin: 0 15px 0 0;
            }

            .glitch-name { font-size: 1.4rem; }

            .links-grid {
                grid-template-columns: 1fr 1fr; /* Keep 2 columns for compact height */
            }

            .btn { padding: 12px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div class="hud">
        <div id="score">KILLS: 0</div>
    </div>

    <div id="scene">
        <main class="main-panel">
            <section class="id-section">
                <div class="logo-container">
                    <img src="logo.png" alt="GnarlyGuns">
                </div>
                <div>
                    <h1 class="glitch-name">GnarlyGuns</h1>
                    <p style="font-size: 0.6rem; letter-spacing: 1px; opacity: 0.6;">TAP TO SHOOT ASTEROIDS</p>
                </div>
            </section>

            <section class="links-grid">
                <a href="https://twitch.tv/gnarlyguns" class="btn" target="_blank" style="border-left: 3px solid var(--twitch);">
                    <i class="fab fa-twitch"></i>
                    TWITCH
                </a>
                <a href="https://youtube.com/@gnarlyguns" class="btn" target="_blank">
                    <i class="fab fa-youtube"></i>
                    YOUTUBE
                </a>
                <a href="https://tiktok.com/@gnarlyguns" class="btn" target="_blank">
                    <i class="fab fa-tiktok"></i>
                    TIKTOK
                </a>
                <a href="https://twitter.com/gnarlyguns" class="btn" target="_blank">
                    <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path></svg>
                    X / TWITTER
                </a>
            </section>
        </main>
    </div>

    <script>
        // 1. Interactive 3D - DISABLED ON MOBILE
        const scene = document.getElementById('scene');
        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth > 768) {
                const x = (window.innerWidth / 2 - e.pageX) / 50;
                const y = (window.innerHeight / 2 - e.pageY) / 50;
                scene.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
            }
        });

        // 2. Optimized Game Engine
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let score = 0;
        let asteroids = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Asteroid {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = -50;
                this.size = Math.random() * 20 + 15;
                this.speed = Math.random() * 1.5 + 1;
            }
            update() { 
                this.y += this.speed; 
                if(this.y > canvas.height) { this.y = -50; this.x = Math.random() * canvas.width; }
            }
            draw() {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x, this.y, this.size, this.size);
            }
        }

        function gameLoop() {
            ctx.fillStyle = 'rgba(1, 1, 3, 0.4)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            if (asteroids.length < 12) asteroids.push(new Asteroid());
            asteroids.forEach(a => { a.update(); a.draw(); });
            requestAnimationFrame(gameLoop);
        }

        // SHOOTING LOGIC (Mouse & Touch)
        function handleShoot(clientX, clientY) {
            asteroids.forEach((a, i) => {
                const dx = clientX - (a.x + a.size/2);
                const dy = clientY - (a.y + a.size/2);
                if (Math.hypot(dx, dy) < 50) {
                    asteroids.splice(i, 1);
                    score++;
                    document.getElementById('score').innerText = `KILLS: ${score}`;
                }
            });
        }

        window.addEventListener('mousedown', (e) => handleShoot(e.clientX, e.clientY));
        window.addEventListener('touchstart', (e) => {
            handleShoot(e.touches[0].clientX, e.touches[0].clientY);
        });

        gameLoop();
    </script>
</body>
</html>
